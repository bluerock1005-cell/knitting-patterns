<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧶 编织图纸库</title>
    <style>
        :root {
            --bg: #faf6f0;
            --card-bg: #ffffff;
            --primary: #b85c5c;
            --primary-light: #e8b4b4;
            --primary-dark: #8b3a3a;
            --text: #3a3027;
            --text-light: #8a7a6a;
            --border: #e5ddd3;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 14px;
            --sidebar-width: 180px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ─── 顶部头部 ─── */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            padding: 2rem 1.5rem 1.5rem;
            text-align: center;
        }
        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        header p {
            opacity: 0.85;
            font-size: 0.9rem;
        }

        /* ─── 主布局：侧边栏 + 内容 ─── */
        .layout {
            display: flex;
            max-width: 1200px;
            margin: 1.5rem auto 0;
            padding: 0 1.5rem;
            gap: 1.2rem;
        }

        /* ─── 侧边栏 ─── */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.2rem 0.8rem;
            position: sticky;
            top: 1rem;
            align-self: flex-start;
        }
        .sidebar-section {
            margin-bottom: 1rem;
        }
        .sidebar-section:last-child {
            margin-bottom: 0;
        }
        .sidebar-title {
            font-size: 0.78rem;
            color: var(--text-light);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0 0.6rem;
            margin-bottom: 0.5rem;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0.55rem 0.7rem;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            color: var(--text);
            transition: background 0.15s, color 0.15s;
            font-family: inherit;
        }
        .sidebar-item:hover {
            background: var(--bg);
        }
        .sidebar-item.active {
            background: var(--primary);
            color: #fff;
        }
        .sidebar-item.active:hover {
            background: var(--primary-dark);
        }
        .sidebar-item.active .sidebar-count {
            background: rgba(255,255,255,0.25);
            color: #fff;
        }
        .sidebar-label {
            font-weight: 400;
        }
        .sidebar-item.active .sidebar-label {
            font-weight: 500;
        }
        .sidebar-count {
            font-size: 0.72rem;
            background: var(--bg);
            color: var(--text-light);
            padding: 0.1rem 0.45rem;
            border-radius: 6px;
            min-width: 20px;
            text-align: center;
        }

        /* ─── 内容区 ─── */
        .content {
            flex: 1;
            min-width: 0;
        }

        /* ─── 搜索栏 ─── */
        .toolbar {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .search-box {
            flex: 1;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 0.5rem 0.8rem 0.5rem 2.2rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.92rem;
            transition: border-color 0.2s;
            background: var(--bg);
            color: var(--text);
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 0.6rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
        }
        .stats {
            font-size: 0.82rem;
            color: var(--text-light);
            white-space: nowrap;
        }

        /* ─── 手机端抽屉按钮 ─── */
        .drawer-toggle {
            display: none;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.7rem;
            cursor: pointer;
            font-size: 0.92rem;
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .drawer-toggle:hover {
            border-color: var(--primary);
        }

        /* ─── 卡片网格 ─── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .card-thumb {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary-light), #f3d9d9);
            overflow: hidden;
        }
        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-thumb .placeholder {
            font-size: 3rem;
        }
        .card-body {
            padding: 0.9rem 1.1rem 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-bottom: 0.6rem;
        }
        .tag {
            font-size: 0.72rem;
            padding: 0.12rem 0.5rem;
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-light);
            border: 1px solid var(--border);
        }
        .tag.cat-棒针 { background: #fce8e8; color: #a04545; border-color: #f0c8c8; }
        .tag.cat-钩针 { background: #e8f0fc; color: #4565a0; border-color: #c8d8f0; }
        .card-info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            margin-bottom: 0.7rem;
            flex: 1;
            font-size: 0.76rem;
            color: var(--text-light);
        }
        .info-item {
            display: block;
            padding: 0.12rem 0;
            border-bottom: 1px dotted var(--border);
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .card-actions {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.45rem 0.9rem;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 500;
            text-align: center;
            transition: background 0.2s;
            align-self: flex-start;
        }
        .download-btn:hover {
            background: var(--primary-dark);
        }
        .ravelry-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.45rem 0.7rem;
            color: var(--primary);
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 500;
            border: 1.5px solid var(--primary-light);
            transition: background 0.2s;
        }
        .ravelry-link:hover {
            background: var(--primary-light);
            color: var(--primary-dark);
        }

        /* ─── 空状态 ─── */
        .empty {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-light);
        }
        .empty .emoji {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        /* ─── 页脚 ─── */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.78rem;
            color: var(--text-light);
        }

        /* ─── 手机端侧边栏抽屉 ─── */
        .drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 90;
        }
        .drawer-overlay.open {
            display: block;
        }
        .sidebar.mobile-drawer {
            display: none;
        }
        .sidebar.mobile-drawer.open {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            z-index: 100;
            border-radius: 0;
            padding: 1rem 0.8rem;
            overflow-y: auto;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
        }

        @media (max-width: 700px) {
            header h1 { font-size: 1.4rem; }
            .layout {
                flex-direction: column;
                padding: 0 1rem;
                gap: 0;
            }
            .sidebar {
                display: none;
            }
            .sidebar.mobile-drawer {
                display: none;
            }
            .drawer-toggle {
                display: block;
            }
            .toolbar {
                flex-wrap: wrap;
            }
            .search-box {
                flex: 1 1 100%;
                order: 2;
            }
            .drawer-toggle {
                order: 1;
            }
            .stats {
                order: 3;
                width: 100%;
                text-align: center;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }
    </style>
</head>

        // 筛选状态
        let activeCategory = '';

        // ─── 侧边栏点击 ───
        sidebar.addEventListener('click', e => {
            const item = e.target.closest('.sidebar-item');
            if (!item) return;

            if (item.classList.contains('cat-item')) {
                activeCategory = item.dataset.category;

                const cat = el.dataset.category;
                const count = cat ? catGroup.filter(p => p.category === cat && (q ? (p.title.toLowerCase().includes(q) || p.notes.toLowerCase().includes(q)) : true)).length
                    : catGroup.filter(p => q ? (p.title.toLowerCase().includes(q) || p.notes.toLowerCase().includes(q)) : true).length;
                el.querySelector('.sidebar-count').textContent = count;
            });

            sidebar.querySelectorAll('.type-item').forEach(el => {
                const t = el.dataset.type;
                const count = t ? typeGroup.filter(p => p.type === t && (q ? (p.title.toLowerCase().includes(q) || p.notes.toLowerCase().includes(q)) : true)).length
                    : typeGroup.filter(p => q ? (p.title.toLowerCase().includes(q) || p.notes.toLowerCase().includes(q)) : true).length;
                el.querySelector('.sidebar-count').textContent = count;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty" style="grid-column: 1 / -1;">
                        <div class="emoji">🧶</div>
                        <p>没有找到匹配的图纸</p>
                    </div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => {
                const tags = [];
                if (p.category) tags.push(`<span class="tag cat-${p.category}">${p.category}</span>`);
                if (p.type) tags.push(`<span class="tag">${p.type}</span>`);

                const hasImage = p.image && p.image.trim() !== '';
                const imgSrc = hasImage ? `images/${encodeURIComponent(p.image)}` : '';
                const thumbContent = hasImage
                    ? `<img src="${imgSrc}" alt="${escapeHtml(p.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\'placeholder\'>🧶</span>';">`
                    : `<span class="placeholder">🧶</span>`;

                // 解析备注为结构化信息行
                let notesHtml = '';
                if (p.notes) {
                    const parts = p.notes.split('|').map(s => s.trim()).filter(Boolean);
                    const infoItems = parts.map(part => {
                        let icon = '📌';
                        if (part.startsWith('作者')) icon = '✍️';
                        else if (part.startsWith('建议线材')) icon = '🧵';
                        else if (part.startsWith('密度')) icon = '📐';
                        else if (part.startsWith('针码')) icon = '🪡';
                        else if (part.startsWith('用量')) icon = '📏';
                        else if (part.startsWith('尺码')) icon = '📊';
                        else if (part.startsWith('评分')) icon = '⭐';
                        else if (part.startsWith('售价')) icon = '💰';
                        return `<span class="info-item">${icon} ${escapeHtml(part)}</span>`;
                    });
                    notesHtml = `<div class="card-info">${infoItems.join('')}</div>`;
                }

                const ravelryLink = p.url && p.url.trim() !== ''
                    ? `<a class="ravelry-link" href="${escapeHtml(p.url)}" target="_blank" rel="noopener">🔗 Ravelry</a>`
                    : '';

                return `
                    <div class="card">
                        <div class="card-thumb">${thumbContent}</div>
                        <div class="card-body">
                            <div class="card-title">${escapeHtml(p.title)}</div>
                            <div class="tags">${tags.join('')}</div>
                            ${notesHtml}
                            <div class="card-actions">
                                <a class="download-btn" href="patterns/${encodeURIComponent(p.filename)}" download>
                                    📄 下载 PDF
                                </a>
                                ${ravelryLink}
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        searchInput.addEventListener('input', render);

        render();
    </script>
</body>
</html>
