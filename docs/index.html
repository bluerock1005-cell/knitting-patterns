<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧶 编织图纸库</title>
    <style>
        :root {
            --bg: #faf6f0;
            --card-bg: #ffffff;
            --primary: #b85c5c;
            --primary-light: #e8b4b4;
            --primary-dark: #8b3a3a;
            --text: #3a3027;
            --text-light: #8a7a6a;
            --border: #e5ddd3;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ─── 顶部头部 ─── */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            padding: 2.5rem 1.5rem 2rem;
            text-align: center;
        }
        header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }
        header p {
            opacity: 0.85;
            font-size: 0.95rem;
        }

        /* ─── 工具栏 ─── */
        .toolbar {
            max-width: 1100px;
            margin: -1.2rem auto 0;
            padding: 0 1.5rem;
            position: relative;
            z-index: 10;
        }
        .toolbar-inner {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }
        .search-box {
            flex: 1 1 220px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 0.6rem 0.8rem 0.6rem 2.3rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            background: var(--bg);
            color: var(--text);
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 0.7rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
        }
        select {
            padding: 0.55rem 0.8rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.2s;
        }
        select:focus { outline: none; border-color: var(--primary); }

        .stats {
            font-size: 0.85rem;
            color: var(--text-light);
            white-space: nowrap;
        }

        /* ─── 卡片网格 ─── */
        .grid {
            max-width: 1100px;
            margin: 1.5rem auto 3rem;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .card-thumb {
            background: linear-gradient(135deg, var(--primary-light), #f3d9d9);
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .card-body {
            padding: 1rem 1.2rem 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: var(--text);
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-bottom: 0.7rem;
        }
        .tag {
            font-size: 0.75rem;
            padding: 0.15rem 0.55rem;
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-light);
            border: 1px solid var(--border);
        }
        .tag.cat-棒针 { background: #fce8e8; color: #a04545; border-color: #f0c8c8; }
        .tag.cat-钩针 { background: #e8f0fc; color: #4565a0; border-color: #c8d8f0; }
        .tag.diff-初级 { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .tag.diff-中级 { background: #fff3e0; color: #e65100; border-color: #ffe0b2; }
        .tag.diff-高级 { background: #fce4ec; color: #c62828; border-color: #f8bbd0; }

        .card-notes {
            font-size: 0.82rem;
            color: var(--text-light);
            margin-bottom: 0.8rem;
            flex: 1;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            text-align: center;
            transition: background 0.2s;
            align-self: flex-start;
        }
        .download-btn:hover {
            background: var(--primary-dark);
        }

        /* ─── 空状态 ─── */
        .empty {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-light);
        }
        .empty .emoji {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        /* ─── 页脚 ─── */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-light);
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            .toolbar-inner { flex-direction: column; align-items: stretch; }
            .search-box { flex: 1 1 100%; }
            select { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🧶 编织图纸库</h1>
        <p>我的毛线图纸收藏 · 点击下载 PDF</p>
    </header>

    <div class="toolbar">
        <div class="toolbar-inner">
            <div class="search-box">
                <input type="text" id="search" placeholder="搜索标题、备注…" />
            </div>
            <select id="filter-category">
                <option value="">全部分类</option>
                <option value="棒针">棒针</option>
            </select>
            <select id="filter-type">
                <option value="">全部类型</option>
                <option value="罩衫">罩衫</option>
            </select>
            <select id="filter-language">
                <option value="">全部语言</option>
                <option value="英/法/德">英/法/德</option>
            </select>
            <select id="filter-difficulty">
                <option value="">全部难度</option>
                <option value="中高级">中高级</option>
            </select>
            <span class="stats" id="stats"></span>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <footer>
        由 generate_site.py 自动生成 · 数据来源 patterns.csv
    </footer>

    <script>
        const PATTERNS = [{"filename": "TwistVeil_Blouse.pdf", "title": "TwistVeil Blouse 罩衫", "category": "棒针", "type": "罩衫", "language": "英/法/德", "difficulty": "中高级", "notes": "设计师Natalja Ledvanova 从上往下V领长袖无缝 4.0mm针 密度21针×31行 用线:羊绒+马海毛双股 合身版6个尺码XS-XXL(86-123cm胸围) 评分5.0 Ravelry售价€8"}];

        const grid = document.getElementById('grid');
        const stats = document.getElementById('stats');
        const searchInput = document.getElementById('search');
        const filters = {
            category: document.getElementById('filter-category'),
            type: document.getElementById('filter-type'),
            language: document.getElementById('filter-language'),
            difficulty: document.getElementById('filter-difficulty'),
        };

        function render() {
            const q = searchInput.value.trim().toLowerCase();
            const fc = filters.category.value;
            const ft = filters.type.value;
            const fl = filters.language.value;
            const fd = filters.difficulty.value;

            const filtered = PATTERNS.filter(p => {
                if (q && !(p.title.toLowerCase().includes(q) || p.notes.toLowerCase().includes(q) || p.filename.toLowerCase().includes(q)))
                    return false;
                if (fc && p.category !== fc) return false;
                if (ft && p.type !== ft) return false;
                if (fl && p.language !== fl) return false;
                if (fd && p.difficulty !== fd) return false;
                return true;
            });

            stats.textContent = `共 ${filtered.length} / ${PATTERNS.length} 张`;

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty" style="grid-column: 1 / -1;">
                        <div class="emoji">🧶</div>
                        <p>没有找到匹配的图纸</p>
                    </div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => {
                const tags = [];
                if (p.category) tags.push(`<span class="tag cat-${p.category}">${p.category}</span>`);
                if (p.type) tags.push(`<span class="tag">${p.type}</span>`);
                if (p.language) tags.push(`<span class="tag">${p.language}</span>`);
                if (p.difficulty) tags.push(`<span class="tag diff-${p.difficulty}">${p.difficulty}</span>`);

                const thumbEmoji = p.category === '钩针' ? '🧶' : '🧶';

                return `
                    <div class="card">
                        <div class="card-thumb">${thumbEmoji}</div>
                        <div class="card-body">
                            <div class="card-title">${escapeHtml(p.title)}</div>
                            <div class="tags">${tags.join('')}</div>
                            ${p.notes ? `<div class="card-notes">${escapeHtml(p.notes)}</div>` : ''}
                            <a class="download-btn" href="../patterns/${encodeURIComponent(p.filename)}" download>
                                📄 下载 PDF
                            </a>
                        </div>
                    </div>`;
            }).join('');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        searchInput.addEventListener('input', render);
        Object.values(filters).forEach(sel => sel.addEventListener('change', render));

        render();
    </script>
</body>
</html>
